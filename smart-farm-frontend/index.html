<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧农场综合管理平台</title>
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Vue Router -->
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <!-- Axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <!-- Element Plus -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/element-plus"></script>
    <!-- Element Plus Icons -->
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>
    <!-- ECharts -->
    <script src="https://unpkg.com/echarts@5/dist/echarts.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [v-cloak] { display: none; }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        body { margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif; }
        .el-menu--horizontal { border-bottom: none !important; }
        .stat-card .el-card__body { padding: 20px; }
        .stat-card .stat-value { font-size: 28px; font-weight: bold; line-height: 1.2; }
        .stat-card .stat-label { font-size: 13px; color: #909399; margin-top: 8px; }
        .stat-card .stat-icon { font-size: 36px; opacity: 0.8; }
        .device-card .el-card__body { padding: 20px; }
        .device-card .device-status { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; }
        .device-card .status-running { background: #f0f9eb; color: #67c23a; }
        .device-card .status-standby { background: #f4f4f5; color: #909399; }
        .device-card .status-fault { background: #fef0f0; color: #f56c6c; }
        .device-card .status-maintenance { background: #fdf6ec; color: #e6a23c; }
        .agent-workbench .metric-label { color: #909399; font-size: 13px; margin-bottom: 8px; }
        .agent-workbench .metric-value { font-size: 26px; font-weight: 700; line-height: 1.2; word-break: break-all; }
        .agent-workbench .metric-value.small { font-size: 15px; color: #303133; }
        .agent-workbench .list-title { font-size: 13px; font-weight: 700; margin-top: 8px; color: #303133; }
        .agent-workbench .compact-list { margin: 6px 0 0; padding-left: 18px; color: #606266; font-size: 13px; line-height: 1.7; }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <app-layout></app-layout>
    </div>

    <!-- API Service -->
    <script src="./js/api.js"></script>
    <!-- Components -->
    <script src="./js/components/Login.js"></script>
    <script src="./js/components/AppLayout.js"></script>
    <script src="./js/components/Dashboard.js"></script>
    <script src="./js/components/DeviceList.js"></script>
    <script src="./js/components/EnvironmentData.js"></script>
    <script src="./js/components/Statistics.js"></script>
    <script src="./js/components/UserManagement.js"></script>
    <script src="./js/components/AIAssistant.js"></script>
    <script src="./js/components/UserProfile.js"></script>
    <script src="./js/components/TaskManagement.js"></script>
    <script src="./js/components/AlertCenter.js"></script>
    <!-- App -->
    <script src="./js/app.js"></script>
</body>
</html>
