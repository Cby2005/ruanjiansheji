server:
  port: 8080

spring:
  application:
    name: smart-farm-platform
  datasource:
    url: jdbc:mysql://localhost:3306/smart_farm?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: "20050828"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# 小米 MiMo AI API 配置
mimo:
  api:
    key: ${MIMO_API_KEY:}
    base-url: ${MIMO_BASE_URL:https://api.xiaomimimo.com/v1}
  model: ${MIMO_MODEL:mimo-v2.5-pro}

logging:
  level:
    com.cby.smartfarm: DEBUG
