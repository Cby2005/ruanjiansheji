server:
  port: 8080

spring:
  application:
    name: smart-farm-platform
  datasource:
    url: jdbc:mysql://localhost:3306/smart_farm?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: "20050828"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# 小米 MiMo AI API 配置
mimo:
  api:
    key: ${MIMO_API_KEY:}
    base-url: ${MIMO_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
  model: ${MIMO_MODEL:mimo-v2.5-pro}

open-meteo:
  forecast-url: ${OPEN_METEO_FORECAST_URL:https://api.open-meteo.com/v1/forecast}
  archive-url: ${OPEN_METEO_ARCHIVE_URL:https://archive-api.open-meteo.com/v1/archive}
  timezone: ${OPEN_METEO_TIMEZONE:Asia/Shanghai}

farm:
  default:
    latitude: ${FARM_DEFAULT_LATITUDE:39.9042}
    longitude: ${FARM_DEFAULT_LONGITUDE:116.4074}

milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  database: ${MILVUS_DATABASE:default}
  collection: ${MILVUS_COLLECTION:smart_farm_rag_chunks}
  embedding-dim: ${MILVUS_EMBEDDING_DIM:1024}
  metric-type: ${MILVUS_METRIC_TYPE:COSINE}
  index-type: ${MILVUS_INDEX_TYPE:HNSW}

embedding:
  provider: ${EMBEDDING_TYPE:api}
  base-url: ${EMBEDDING_API_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  api-key: ${EMBEDDING_API_KEY:sk-a29c67d7442a49508444c950477fb968}
  model: ${EMBEDDING_MODEL_NAME:text-embedding-v3}
  dimension: ${EMBEDDING_DIMENSION:1024}
  batch-size: ${EMBEDDING_BATCH_SIZE:10}
  local-model-path: ${EMBEDDING_LOCAL_MODEL_PATH:BAAI/bge-base-zh-v1.5}

logging:
  level:
    com.cby.smartfarm: DEBUG
